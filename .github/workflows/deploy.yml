name: Build and Push NextJS to Harbor

on:
  push:
    branches: [ "main" ]

env:
  HARBOR_REGISTRY: harbor100.waltonbd.com:8443
  HARBOR_PROJECT: lab-apps
  IMAGE_NAME: nextjs-frontend
  GITOPS_REPO: isahak05/argocd-lab-manifests

jobs:
  build-and-push:
    runs-on: arc-runner-set # Routes directly to your Kubernetes self-hosted runner

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  update-manifests:
    needs: build-and-push
    runs-on: arc-runner-set
    steps:
      - name: Checkout ArgoCD Manifests Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }} # Uses your GitHub PAT to authenticates write-back

      - name: Update Image Tag in Deployment YAML
        run: |
          # Replaces the placeholder image tag with the precise Git Commit SHA
          sed -i "s|image: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:.*|image: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" manifests/nextjs-deployment.yaml
          
          # Git configuration for the runner agent
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Commit and push changes back to your GitOps repository
          git commit -am "chore: automate update nextjs image tag to ${{ github.sha }}"
          git push
