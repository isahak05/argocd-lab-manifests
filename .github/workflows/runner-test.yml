name: K8s Runner Verification Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger this manually from the GitHub UI

jobs:
  validate-cluster:
    # This MUST match the name of your Helm release exactly
    runs-on: arc-runner-set

    steps:
      - name: Acknowledge Runner Execution
        run: |
          echo "🚀 Success! The workflow is executing inside my Kubernetes cluster test."
          echo "Runner OS: $RUNNER_OS"
          echo "Node Info:"
          uname -a
