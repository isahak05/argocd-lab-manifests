apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-frontend
  template:
    metadata:
      labels:
        app: nextjs-frontend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: nextjs
          image: harbor100.waltonbd.com:8443/lab-apps/nextjs-frontend:PLACEHOLDER
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-service
  namespace: default
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: nextjs-frontend
